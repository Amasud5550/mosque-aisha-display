<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, height=1920, initial-scale=1.0" />
  <title>Mosque Aisha Display</title>

  <style>
    :root {
      --bg: #031a33;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-strong: rgba(255, 255, 255, 0.12);
      --text: #ffffff;
      --muted: #d7e4f2;
      --accent: #ffd166;
      --accent-dark: #c89b23;
      --line: rgba(255, 255, 255, 0.12);
      --green: #7ef29a;

      --font-xl: 72px;
      --font-lg: 44px;
      --font-md: 34px;
      --font-sm: 28px;
      --font-xs: 22px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #021428, #062346);
      color: var(--text);
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .screen {
      width: 1080px;
      height: 1920px;
      padding: 40px 50px;
      display: grid;
      grid-template-rows: auto auto auto 1fr auto auto;
      gap: 24px;
      background: var(--bg);
    }

    .top {
      display: grid;
      grid-template-columns: 180px 1fr;
      align-items: center;
      gap: 24px;
    }

    .logo {
      width: 170px;
      height: auto;
      object-fit: contain;
      justify-self: center;
    }

    .heading {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
    }

    .title {
      font-size: var(--font-xl);
      font-weight: 700;
      line-height: 1.05;
      margin: 0;
    }

    .subtitle {
      margin-top: 8px;
      font-size: var(--font-md);
      color: var(--muted);
    }

    .datetimeRow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .infoCard {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 22px 28px;
      text-align: center;
    }

    .infoLabel {
      font-size: var(--font-xs);
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .infoValue {
      font-size: var(--font-lg);
      font-weight: 700;
    }

    .nextPrayerCard {
      background: linear-gradient(135deg, rgba(255, 209, 102, 0.18), rgba(255, 209, 102, 0.08));
      border: 2px solid rgba(255, 209, 102, 0.35);
      border-radius: 24px;
      padding: 24px 30px;
      text-align: center;
    }

    .nextPrayerTitle {
      font-size: var(--font-sm);
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .nextPrayerName {
      font-size: 64px;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .nextPrayerMeta {
      font-size: var(--font-md);
      color: var(--text);
    }

    .countdown {
      margin-top: 10px;
      font-size: var(--font-sm);
      font-weight: 700;
      color: var(--green);
    }

    .tableCard {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 26px 28px;
    }

    .tableTitle {
      margin: 0 0 18px 0;
      text-align: center;
      font-size: 42px;
      font-weight: 800;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    tr {
      border-bottom: 1px solid var(--line);
    }

    tr:last-child {
      border-bottom: none;
    }

    td {
      padding: 18px 10px;
      font-size: 38px;
    }

    td:first-child {
      font-weight: 600;
      color: var(--muted);
    }

    td:last-child {
      text-align: right;
      font-weight: 700;
      color: var(--text);
    }

    tr.active {
      background: rgba(255, 209, 102, 0.12);
      border-radius: 12px;
    }

    tr.active td:first-child,
    tr.active td:last-child {
      color: var(--accent);
      font-weight: 800;
    }

    .imageWrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      min-height: 420px;
    }

    .image {
      width: 100%;
      height: 100%;
      max-height: 390px;
      object-fit: contain;
      border-radius: 16px;
    }

    .footer {
      text-align: center;
      font-size: var(--font-sm);
      font-weight: 700;
      color: var(--text);
      padding-top: 6px;
    }

    /* Admin */
    #adminPortal {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: 320px;
      display: none;
      flex-direction: column;
      gap: 8px;
      padding: 18px;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.9);
      z-index: 999;
    }

    #adminPortal.show {
      display: flex;
    }

    #adminPortal h3 {
      margin: 0 0 8px 0;
      font-size: 20px;
      text-align: center;
    }

    #adminPortal input {
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      text-align: center;
    }

    #adminPortal button {
      margin-top: 6px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      background: #0074d9;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="top">
      <img
        src="https://mosqueaisha.ca/assets/logo-clear.png"
        alt="Mosque Aisha logo"
        class="logo"
      />

      <div class="heading">
        <h1 class="title">Mosque Aisha</h1>
        <div class="subtitle">Niagara Falls, Ontario</div>
      </div>
    </div>

    <div class="datetimeRow">
      <div class="infoCard">
        <div class="infoLabel">Today</div>
        <div id="currentDate" class="infoValue">--</div>
      </div>

      <div class="infoCard">
        <div class="infoLabel">Current Time</div>
        <div id="currentTime" class="infoValue">--</div>
      </div>
    </div>

    <div class="nextPrayerCard">
      <div class="nextPrayerTitle">Next Prayer</div>
      <div id="nextPrayerName" class="nextPrayerName">Loading...</div>
      <div id="nextPrayerMeta" class="nextPrayerMeta">--</div>
      <div id="countdown" class="countdown">--</div>
    </div>

    <div class="tableCard">
      <h2 class="tableTitle">Today's Prayer Times</h2>
      <table>
        <tr data-prayer="fajr"><td>Fajr</td><td id="fajrTime">--:--</td></tr>
        <tr data-prayer="dhuhr"><td>Dhuhr</td><td id="dhuhrTime">--:--</td></tr>
        <tr data-prayer="asr"><td>Asr</td><td id="asrTime">--:--</td></tr>
        <tr data-prayer="maghrib"><td>Maghrib</td><td id="maghribTime">--:--</td></tr>
        <tr data-prayer="isha"><td>Isha</td><td id="ishaTime">--:--</td></tr>
        <tr><td>Jumah 1</td><td id="jumah1Time">--:--</td></tr>
        <tr><td>Jumah 2</td><td id="jumah2Time">--:--</td></tr>
      </table>
    </div>

    <div class="imageWrap">
      <img id="rotatingImage" class="image" alt="Community announcement" />
    </div>

    <div class="footer">contact@mosqueaisha.ca • (905) 347-2633</div>
  </div>

  <div id="adminPortal">
    <h3>Admin Panel</h3>
    <input id="fajrInput" placeholder="Fajr">
    <input id="dhuhrInput" placeholder="Dhuhr">
    <input id="asrInput" placeholder="Asr">
    <input id="maghribInput" placeholder="Maghrib">
    <input id="ishaInput" placeholder="Isha">
    <input id="jumah1Input" placeholder="Jumah 1">
    <input id="jumah2Input" placeholder="Jumah 2">
    <button id="updateTimesBtn">Update Times</button>
  </div>

  <script>
    const TIMEZONE = "America/Toronto";

    const CONFIG = {
      prayerJsonUrl: "https://raw.githubusercontent.com/Amasud5550/mosque-aisha-display/main/prayerTimes.json",
      maghribApiUrl: "https://api.aladhan.com/v1/timingsByCity?city=Niagara%20Falls&country=Canada&method=2",
      autoReloadMs: 60 * 60 * 1000,
      imageRotateMs: 15000
    };

    const images = [
      "https://raw.githubusercontent.com/Amasud5550/mosque-aisha-display/main/CommunityIftar26.jpeg"
    ];

    const prayerOrder = ["fajr", "dhuhr", "asr", "maghrib", "isha"];
    const prayerLabels = {
      fajr: "Fajr",
      dhuhr: "Dhuhr",
      asr: "Asr",
      maghrib: "Maghrib",
      isha: "Isha"
    };

    const state = {
      prayers: {
        fajr: "--:--",
        dhuhr: "--:--",
        asr: "--:--",
        maghrib: "--:--",
        isha: "--:--",
        jumah1: "--:--",
        jumah2: "--:--"
      },
      fallbackMaghrib: "--:--",
      imageIndex: 0
    };

    const $ = (id) => document.getElementById(id);

    function setText(id, value) {
      const el = $(id);
      if (el) el.textContent = value || "--";
    }

    function updateClock() {
      const now = new Date();

      const dateText = new Intl.DateTimeFormat("en-CA", {
        weekday: "long",
        month: "long",
        day: "numeric",
        year: "numeric",
        timeZone: TIMEZONE
      }).format(now);

      const timeText = new Intl.DateTimeFormat("en-CA", {
        hour: "numeric",
        minute: "2-digit",
        second: "2-digit",
        hour12: true,
        timeZone: TIMEZONE
      }).format(now);

      setText("currentDate", dateText);
      setText("currentTime", timeText);

      updateNextPrayer();
    }

    function renderPrayerTimes() {
      setText("fajrTime", state.prayers.fajr);
      setText("dhuhrTime", state.prayers.dhuhr);
      setText("asrTime", state.prayers.asr);
      setText("maghribTime", state.prayers.maghrib);
      setText("ishaTime", state.prayers.isha);
      setText("jumah1Time", state.prayers.jumah1);
      setText("jumah2Time", state.prayers.jumah2);
    }

    function parseTimeToday(timeStr) {
      if (!timeStr || timeStr === "--:--") return null;

      const cleaned = timeStr.trim();
      const match12 = cleaned.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
      const match24 = cleaned.match(/^(\d{1,2}):(\d{2})$/);

      const now = new Date();
      const localNow = new Date(
        now.toLocaleString("en-US", { timeZone: TIMEZONE })
      );

      let hours, minutes;

      if (match12) {
        hours = parseInt(match12[1], 10);
        minutes = parseInt(match12[2], 10);
        const meridian = match12[3].toUpperCase();

        if (meridian === "PM" && hours !== 12) hours += 12;
        if (meridian === "AM" && hours === 12) hours = 0;
      } else if (match24) {
        hours = parseInt(match24[1], 10);
        minutes = parseInt(match24[2], 10);
      } else {
        return null;
      }

      const prayerDate = new Date(localNow);
      prayerDate.setHours(hours, minutes, 0, 0);
      return prayerDate;
    }

    function formatCountdown(ms) {
      if (ms <= 0) return "Now";

      const totalSeconds = Math.floor(ms / 1000);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      if (hours > 0) {
        return `${hours}h ${minutes}m ${seconds}s remaining`;
      }
      return `${minutes}m ${seconds}s remaining`;
    }

    function clearActivePrayerRow() {
      document.querySelectorAll("tr[data-prayer]").forEach((row) => {
        row.classList.remove("active");
      });
    }

    function updateNextPrayer() {
      clearActivePrayerRow();

      const now = new Date(
        new Date().toLocaleString("en-US", { timeZone: TIMEZONE })
      );

      let nextPrayer = null;

      for (const prayer of prayerOrder) {
        const prayerDate = parseTimeToday(state.prayers[prayer]);
        if (prayerDate && prayerDate > now) {
          nextPrayer = {
            key: prayer,
            label: prayerLabels[prayer],
            time: state.prayers[prayer],
            date: prayerDate
          };
          break;
        }
      }

      if (!nextPrayer) {
        const tomorrowFajr = parseTimeToday(state.prayers.fajr);
        if (tomorrowFajr) {
          tomorrowFajr.setDate(tomorrowFajr.getDate() + 1);
          nextPrayer = {
            key: "fajr",
            label: "Fajr",
            time: state.prayers.fajr,
            date: tomorrowFajr
          };
        }
      }

      if (!nextPrayer) {
        setText("nextPrayerName", "Unavailable");
        setText("nextPrayerMeta", "--");
        setText("countdown", "--");
        return;
      }

      const diff = nextPrayer.date - now;

      setText("nextPrayerName", nextPrayer.label);
      setText("nextPrayerMeta", `${nextPrayer.time}`);
      setText("countdown", formatCountdown(diff));

      const activeRow = document.querySelector(`tr[data-prayer="${nextPrayer.key}"]`);
      if (activeRow) activeRow.classList.add("active");
    }

    async function loadPrayerTimes() {
      try {
        const response = await fetch(CONFIG.prayerJsonUrl, { cache: "no-store" });
        if (!response.ok) throw new Error("Failed to fetch prayerTimes.json");

        const data = await response.json();

        state.prayers.fajr = data.fajr || "--:--";
        state.prayers.dhuhr = data.dhuhr || "--:--";
        state.prayers.asr = data.asr || "--:--";
        state.prayers.maghrib = data.maghrib || "--:--";
        state.prayers.isha = data.isha || "--:--";
        state.prayers.jumah1 = data.jumah1 || "--:--";
        state.prayers.jumah2 = data.jumah2 || "--:--";

        state.fallbackMaghrib = state.prayers.maghrib;

        renderPrayerTimes();
        updateNextPrayer();
      } catch (err) {
        console.error("Error loading JSON prayer times:", err);
      }

      fetchMaghribTime();
    }

    async function fetchMaghribTime() {
      try {
        const response = await fetch(CONFIG.maghribApiUrl, { cache: "no-store" });
        if (!response.ok) throw new Error("Failed to fetch Maghrib API");

        const data = await response.json();
        const apiMaghrib = data?.data?.timings?.Maghrib;

        if (apiMaghrib) {
          state.prayers.maghrib = apiMaghrib;
        } else {
          state.prayers.maghrib = state.fallbackMaghrib;
        }

        renderPrayerTimes();
        updateNextPrayer();
      } catch (err) {
        console.error("Error loading Maghrib API:", err);
        state.prayers.maghrib = state.fallbackMaghrib;
        renderPrayerTimes();
        updateNextPrayer();
      }
    }

    function rotateImages() {
      const imageEl = $("rotatingImage");
      if (!imageEl || images.length === 0) return;

      imageEl.src = images[state.imageIndex];
      state.imageIndex = (state.imageIndex + 1) % images.length;
    }

    function updateAdminTimes() {
      const keys = ["fajr", "dhuhr", "asr", "maghrib", "isha", "jumah1", "jumah2"];

      keys.forEach((key) => {
        const input = $(`${key}Input`);
        if (input && input.value.trim()) {
          state.prayers[key] = input.value.trim();
        }
      });

      state.fallbackMaghrib = state.prayers.maghrib;
      renderPrayerTimes();
      updateNextPrayer();
    }

    function toggleAdmin(e) {
      if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "a") {
        $("adminPortal").classList.toggle("show");
      }
    }

    $("updateTimesBtn").addEventListener("click", updateAdminTimes);
    document.addEventListener("keydown", toggleAdmin);

    updateClock();
    setInterval(updateClock, 1000);

    rotateImages();
    if (images.length > 1) {
      setInterval(rotateImages, CONFIG.imageRotateMs);
    }

    setInterval(() => location.reload(), CONFIG.autoReloadMs);

    loadPrayerTimes();
  </script>
</body>
</html>
