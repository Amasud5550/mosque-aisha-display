<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1080, height=1920, initial-scale=1.0"/>
<title>Mosque Aisha Display</title>

<style>
:root{
--bg:#031a33;
--panel:rgba(255,255,255,0.08);
--text:#ffffff;
--muted:#d7e4f2;
--accent:#ffd166;
--line:rgba(255,255,255,0.12);
--green:#7ef29a;
--error:#ff8a8a;

--font-xl:72px;
--font-lg:44px;
--font-md:34px;
--font-sm:28px;
--font-xs:22px;
}

*{box-sizing:border-box;}

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
font-family:Arial,sans-serif;
background:linear-gradient(to bottom,#021428,#062346);
color:var(--text);
}

body{
display:flex;
justify-content:center;
align-items:center;
}

.screen{
width:1080px;
height:1920px;
padding:40px 50px;
display:grid;
grid-template-rows:auto auto auto auto 1fr auto;
gap:24px;
background:var(--bg);
}

.top{
display:grid;
grid-template-columns:180px 1fr;
align-items:center;
gap:24px;
}

.logo{
width:170px;
object-fit:contain;
justify-self:center;
}

.heading{
display:flex;
flex-direction:column;
}

.title{
font-size:var(--font-xl);
font-weight:700;
margin:0;
}

.subtitle{
margin-top:8px;
font-size:var(--font-md);
color:var(--muted);
}

.datetimeRow{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.infoCard{
background:var(--panel);
border:1px solid var(--line);
border-radius:22px;
padding:22px 28px;
text-align:center;
}

.infoLabel{
font-size:var(--font-xs);
color:var(--muted);
margin-bottom:6px;
text-transform:uppercase;
}

.infoValue{
font-size:var(--font-lg);
font-weight:700;
}

.nextPrayerCard{
background:linear-gradient(135deg,rgba(255,209,102,0.18),rgba(255,209,102,0.08));
border:2px solid rgba(255,209,102,0.35);
border-radius:24px;
padding:24px 30px;
text-align:center;
}

.nextPrayerTitle{
font-size:var(--font-sm);
color:var(--muted);
}

.nextPrayerName{
font-size:64px;
font-weight:800;
color:var(--accent);
margin-bottom:6px;
}

.nextPrayerMeta{
font-size:var(--font-md);
}

.countdown{
margin-top:10px;
font-size:var(--font-sm);
font-weight:700;
color:var(--green);
}

.statusBar{
min-height:36px;
font-size:24px;
text-align:center;
color:var(--muted);
}

.statusBar.error{
color:var(--error);
font-weight:700;
}

.tableCard{
background:var(--panel);
border:1px solid var(--line);
border-radius:24px;
padding:26px 28px;
}

.tableTitle{
text-align:center;
font-size:42px;
font-weight:800;
margin-bottom:18px;
}

table{
width:100%;
border-collapse:collapse;
}

tr{
border-bottom:1px solid var(--line);
}

td{
padding:18px 10px;
font-size:38px;
}

td:first-child{
color:var(--muted);
}

td:last-child{
text-align:right;
font-weight:700;
}

tr.active{
background:rgba(255,209,102,0.12);
}

tr.active td{
color:var(--accent);
font-weight:800;
}

.imageWrap{
background:var(--panel);
border:1px solid var(--line);
border-radius:24px;
padding:18px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
min-height:420px;
}

.image{
width:100%;
max-height:390px;
object-fit:contain;
border-radius:16px;
}

.footer{
text-align:center;
font-size:var(--font-sm);
font-weight:700;
}
</style>
</head>

<body>

<div class="screen">

<div class="top">
<img src="https://mosqueaisha.ca/assets/logo-clear.png" class="logo"/>
<div class="heading">
<h1 class="title">Mosque Aisha</h1>
<div class="subtitle">Niagara Falls, Ontario</div>
</div>
</div>

<div class="datetimeRow">
<div class="infoCard">
<div class="infoLabel">Today</div>
<div id="currentDate" class="infoValue">--</div>
</div>

<div class="infoCard">
<div class="infoLabel">Current Time</div>
<div id="currentTime" class="infoValue">--</div>
</div>
</div>

<div class="nextPrayerCard">
<div class="nextPrayerTitle">Next Prayer</div>
<div id="nextPrayerName" class="nextPrayerName">Loading...</div>
<div id="nextPrayerMeta" class="nextPrayerMeta">--</div>
<div id="countdown" class="countdown">--</div>
</div>

<div id="statusBar" class="statusBar">Loading prayer times...</div>

<div class="tableCard">
<h2 class="tableTitle">Today's Prayer Times</h2>
<table>
<tr data-prayer="fajr"><td>Fajr</td><td id="fajrTime">--</td></tr>
<tr id="dhuhrRow" data-prayer="dhuhr"><td>Dhuhr</td><td id="dhuhrTime">--</td></tr>
<tr id="jumah1Row" data-prayer="jumah1"><td>Jumah 1</td><td id="jumah1Time">--</td></tr>
<tr id="jumah2Row" data-prayer="jumah2"><td>Jumah 2</td><td id="jumah2Time">--</td></tr>
<tr data-prayer="asr"><td>Asr</td><td id="asrTime">--</td></tr>
<tr data-prayer="maghrib"><td>Maghrib</td><td id="maghribTime">--</td></tr>
<tr data-prayer="isha"><td>Isha</td><td id="ishaTime">--</td></tr>
</table>
</div>

<div class="imageWrap">
<img id="rotatingImage" class="image"/>
</div>

<div class="footer">contact@mosqueaisha.ca • (905) 347-2633</div>

</div>

<script>

const TIMEZONE="America/Toronto"

const NIAGARA={
lat:43.0896,
lng:-79.0849
}

const CONFIG={
prayerJsonUrl:"./prayerTimes.json"
}

const state={
prayers:{
fajr:"--",
dhuhr:"--",
asr:"--",
maghrib:"--",
isha:"--",
jumah1:"--",
jumah2:"--"
}
}

const $=id=>document.getElementById(id)

function normalizeTime(t){

if(!t)return"--"

t=t.replace(/\./g,"").trim().toUpperCase()

let m=t.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/)

if(m)return`${m[1]}:${m[2]} ${m[3]}`

m=t.match(/^(\d{1,2}):(\d{2})$/)

if(m){

let h=parseInt(m[1])
let mer=h>=12?"PM":"AM"

h=h%12||12

return`${h}:${m[2]} ${mer}`

}

return t

}

function utcToTorontoTime(utc){

const d=new Date(utc)

return new Intl.DateTimeFormat("en-US",{
hour:"numeric",
minute:"2-digit",
hour12:true,
timeZone:TIMEZONE
}).format(d)

}

async function getSunset(){

const r=await fetch(`https://api.sunrise-sunset.org/json?lat=${NIAGARA.lat}&lng=${NIAGARA.lng}&formatted=0`)

const j=await r.json()

return normalizeTime(utcToTorontoTime(j.results.sunset))

}

function setText(id,v){$(id).textContent=v}

function renderTimes(){

setText("fajrTime",state.prayers.fajr)
setText("dhuhrTime",state.prayers.dhuhr)
setText("asrTime",state.prayers.asr)
setText("maghribTime",state.prayers.maghrib)
setText("ishaTime",state.prayers.isha)
setText("jumah1Time",state.prayers.jumah1)
setText("jumah2Time",state.prayers.jumah2)

}

function parseTimeToday(t){

if(!t)return null

let m=t.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/)

if(!m)return null

let h=parseInt(m[1])
let min=parseInt(m[2])
let mer=m[3]

if(mer==="PM"&&h!==12)h+=12
if(mer==="AM"&&h===12)h=0

let d=new Date()

d.setHours(h,min,0,0)

return d

}

function nextPrayer(){

let now=new Date()

const schedule=[
["fajr","Fajr"],
["dhuhr","Dhuhr"],
["asr","Asr"],
["maghrib","Maghrib"],
["isha","Isha"]
]

for(let p of schedule){

let time=parseTimeToday(state.prayers[p[0]])

if(time&&time>now){

setText("nextPrayerName",p[1])
setText("nextPrayerMeta",state.prayers[p[0]])

let diff=time-now

let m=Math.floor(diff/60000)
let s=Math.floor((diff%60000)/1000)

setText("countdown",`${m}m ${s}s remaining`)

return

}

}

}

function updateClock(){

const now=new Date()

setText("currentDate",
new Intl.DateTimeFormat("en-CA",{weekday:"long",month:"long",day:"numeric",year:"numeric",timeZone:TIMEZONE}).format(now)
)

setText("currentTime",
normalizeTime(
new Intl.DateTimeFormat("en-US",{hour:"numeric",minute:"2-digit",second:"2-digit",hour12:true,timeZone:TIMEZONE}).format(now)
)
)

nextPrayer()

}

async function loadPrayerTimes(){

try{

const r=await fetch(CONFIG.prayerJsonUrl)

const j=await r.json()

state.prayers.fajr=normalizeTime(j.fajr)
state.prayers.dhuhr=normalizeTime(j.dhuhr)
state.prayers.asr=normalizeTime(j.asr)
state.prayers.isha=normalizeTime(j.isha)
state.prayers.jumah1=normalizeTime(j.jumah1)
state.prayers.jumah2=normalizeTime(j.jumah2)

state.prayers.maghrib=await getSunset()

renderTimes()

}

catch(e){

$("statusBar").textContent="Prayer times failed to load"

}

}

updateClock()
setInterval(updateClock,1000)

loadPrayerTimes()

</script>

</body>
</html>
