<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, height=1920, initial-scale=1.0" />
  <title>Mosque Aisha Display</title>

  <style>
    :root {
      --bg: #031a33;
      --panel: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --muted: #d7e4f2;
      --accent: #ffd166;
      --line: rgba(255, 255, 255, 0.12);
      --green: #7ef29a;
      --error: #ff8a8a;

      --font-xl: 72px;
      --font-lg: 44px;
      --font-md: 34px;
      --font-sm: 28px;
      --font-xs: 22px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #021428, #062346);
      color: var(--text);
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .screen {
      width: 1080px;
      height: 1920px;
      padding: 40px 50px;
      display: grid;
      grid-template-rows: auto auto auto auto 1fr auto;
      gap: 24px;
      background: var(--bg);
    }

    .top {
      display: grid;
      grid-template-columns: 180px 1fr;
      align-items: center;
      gap: 24px;
    }

    .logo {
      width: 170px;
      height: auto;
      object-fit: contain;
      justify-self: center;
    }

    .heading {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
    }

    .title {
      font-size: var(--font-xl);
      font-weight: 700;
      line-height: 1.05;
      margin: 0;
    }

    .subtitle {
      margin-top: 8px;
      font-size: var(--font-md);
      color: var(--muted);
    }

    .datetimeRow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .infoCard {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 22px 28px;
      text-align: center;
    }

    .infoLabel {
      font-size: var(--font-xs);
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .infoValue {
      font-size: var(--font-lg);
      font-weight: 700;
    }

    .nextPrayerCard {
      background: linear-gradient(135deg, rgba(255, 209, 102, 0.18), rgba(255, 209, 102, 0.08));
      border: 2px solid rgba(255, 209, 102, 0.35);
      border-radius: 24px;
      padding: 24px 30px;
      text-align: center;
    }

    .nextPrayerTitle {
      font-size: var(--font-sm);
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .nextPrayerName {
      font-size: 64px;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .nextPrayerMeta {
      font-size: var(--font-md);
      color: var(--text);
    }

    .countdown {
      margin-top: 10px;
      font-size: var(--font-sm);
      font-weight: 700;
      color: var(--green);
    }

    .statusBar {
      min-height: 36px;
      font-size: 24px;
      text-align: center;
      color: var(--muted);
    }

    .statusBar.error {
      color: var(--error);
      font-weight: 700;
    }

    .tableCard {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 26px 28px;
    }

    .tableTitle {
      margin: 0 0 18px 0;
      text-align: center;
      font-size: 42px;
      font-weight: 800;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    tr {
      border-bottom: 1px solid var(--line);
    }

    tr:last-child {
      border-bottom: none;
    }

    td {
      padding: 18px 10px;
      font-size: 38px;
    }

    td:first-child {
      font-weight: 600;
      color: var(--muted);
    }

    td:last-child {
      text-align: right;
      font-weight: 700;
      color: var(--text);
    }

    tr.active {
      background: rgba(255, 209, 102, 0.12);
    }

    tr.active td:first-child,
    tr.active td:last-child {
      color: var(--accent);
      font-weight: 800;
    }

    .imageWrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      min-height: 420px;
    }

    .image {
      width: 100%;
      height: 100%;
      max-height: 390px;
      object-fit: contain;
      border-radius: 16px;
    }

    .footer {
      text-align: center;
      font-size: var(--font-sm);
      font-weight: 700;
      color: var(--text);
      padding-top: 6px;
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="top">
      <img
        src="https://mosqueaisha.ca/assets/logo-clear.png"
        alt="Mosque Aisha logo"
        class="logo"
      />

      <div class="heading">
        <h1 class="title">Mosque Aisha</h1>
        <div class="subtitle">Niagara Falls, Ontario</div>
      </div>
    </div>

    <div class="datetimeRow">
      <div class="infoCard">
        <div class="infoLabel">Today</div>
        <div id="currentDate" class="infoValue">--</div>
      </div>

      <div class="infoCard">
        <div class="infoLabel">Current Time</div>
        <div id="currentTime" class="infoValue">--</div>
      </div>
    </div>

    <div class="nextPrayerCard">
      <div class="nextPrayerTitle">Next Prayer</div>
      <div id="nextPrayerName" class="nextPrayerName">Loading...</div>
      <div id="nextPrayerMeta" class="nextPrayerMeta">--</div>
      <div id="countdown" class="countdown">--</div>
    </div>

    <div id="statusBar" class="statusBar">Loading prayer times...</div>

    <div class="tableCard">
      <h2 class="tableTitle">Today's Prayer Times</h2>
      <table>
        <tr data-prayer="fajr"><td>Fajr</td><td id="fajrTime">--:--</td></tr>
        <tr id="dhuhrRow" data-prayer="dhuhr"><td>Dhuhr</td><td id="dhuhrTime">--:--</td></tr>
        <tr id="jumah1Row" data-prayer="jumah1"><td>Jumah 1</td><td id="jumah1Time">--:--</td></tr>
        <tr id="jumah2Row" data-prayer="jumah2"><td>Jumah 2</td><td id="jumah2Time">--:--</td></tr>
        <tr data-prayer="asr"><td>Asr</td><td id="asrTime">--:--</td></tr>
        <tr data-prayer="maghrib"><td>Maghrib</td><td id="maghribTime">--:--</td></tr>
        <tr data-prayer="isha"><td>Isha</td><td id="ishaTime">--:--</td></tr>
      </table>
    </div>

    <div class="imageWrap">
      <img id="rotatingImage" class="image" alt="Community announcement" />
    </div>

    <div class="footer">contact@mosqueaisha.ca • (905) 347-2633</div>
  </div>

  <script>
    const TIMEZONE = "America/Toronto";

    const CONFIG = {
      prayerJsonUrl: "./prayerTimes.json",
      autoReloadMs: 60 * 60 * 1000,
      imageRotateMs: 15000
    };

    const images = [
      "https://raw.githubusercontent.com/Amasud5550/mosque-aisha-display/main/CommunityIftar26.jpeg"
    ];

    const state = {
      prayers: {
        fajr: "--:--",
        dhuhr: "--:--",
        asr: "--:--",
        maghrib: "--:--",
        isha: "--:--",
        jumah1: "--:--",
        jumah2: "--:--"
      },
      imageIndex: 0
    };

    const $ = (id) => document.getElementById(id);

    function setText(id, value) {
      const el = $(id);
      if (el) el.textContent = value || "--";
    }

    function setStatus(message, isError = false) {
      const bar = $("statusBar");
      if (!bar) return;
      bar.textContent = message;
      bar.className = isError ? "statusBar error" : "statusBar";
    }

    function formatDisplayTime(timeStr) {
      if (!timeStr || timeStr === "--:--") return "--:--";

      const cleaned = String(timeStr).trim();
      const match12 = cleaned.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
      const match24 = cleaned.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?$/);

      if (match12) {
        const h = parseInt(match12[1], 10);
        const m = match12[2];
        const meridian = match12[3].toUpperCase();
        return `${h}:${m} ${meridian}`;
      }

      if (match24) {
        let hours = parseInt(match24[1], 10);
        const minutes = match24[2];
        const meridian = hours >= 12 ? "PM" : "AM";
        hours = hours % 12 || 12;
        return `${hours}:${minutes} ${meridian}`;
      }

      return cleaned;
    }

    function getTorontoNow() {
      return new Date(
        new Date().toLocaleString("en-US", { timeZone: TIMEZONE })
      );
    }

    function isFridayToronto() {
      return getTorontoNow().getDay() === 5;
    }

    function updateClock() {
      const now = new Date();

      const dateText = new Intl.DateTimeFormat("en-CA", {
        weekday: "long",
        month: "long",
        day: "numeric",
        year: "numeric",
        timeZone: TIMEZONE
      }).format(now);

      const timeText = new Intl.DateTimeFormat("en-CA", {
        hour: "numeric",
        minute: "2-digit",
        second: "2-digit",
        hour12: true,
        timeZone: TIMEZONE
      }).format(now);

      setText("currentDate", dateText);
      setText("currentTime", timeText);

      toggleFridayRows();
      updateNextPrayer();
    }

    function renderPrayerTimes() {
      setText("fajrTime", formatDisplayTime(state.prayers.fajr));
      setText("dhuhrTime", formatDisplayTime(state.prayers.dhuhr));
      setText("asrTime", formatDisplayTime(state.prayers.asr));
      setText("maghribTime", formatDisplayTime(state.prayers.maghrib));
      setText("ishaTime", formatDisplayTime(state.prayers.isha));
      setText("jumah1Time", formatDisplayTime(state.prayers.jumah1));
      setText("jumah2Time", formatDisplayTime(state.prayers.jumah2));
    }

    function parseTimeToday(timeStr) {
      if (!timeStr || timeStr === "--:--") return null;

      const cleaned = String(timeStr).trim();
      const match12 = cleaned.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
      const match24 = cleaned.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?$/);

      const localNow = getTorontoNow();

      let hours;
      let minutes;

      if (match12) {
        hours = parseInt(match12[1], 10);
        minutes = parseInt(match12[2], 10);
        const meridian = match12[3].toUpperCase();

        if (meridian === "PM" && hours !== 12) hours += 12;
        if (meridian === "AM" && hours === 12) hours = 0;
      } else if (match24) {
        hours = parseInt(match24[1], 10);
        minutes = parseInt(match24[2], 10);
      } else {
        return null;
      }

      const prayerDate = new Date(localNow);
      prayerDate.setHours(hours, minutes, 0, 0);
      return prayerDate;
    }

    function formatCountdown(ms) {
      if (ms <= 0) return "Now";

      const totalSeconds = Math.floor(ms / 1000);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      if (hours > 0) {
        return `${hours}h ${minutes}m ${seconds}s remaining`;
      }

      return `${minutes}m ${seconds}s remaining`;
    }

    function clearActivePrayerRow() {
      document.querySelectorAll("tr[data-prayer]").forEach((row) => {
        row.classList.remove("active");
      });
    }

    function toggleFridayRows() {
      const friday = isFridayToronto();

      $("dhuhrRow").style.display = friday ? "none" : "table-row";
      $("jumah1Row").style.display = friday ? "table-row" : "none";
      $("jumah2Row").style.display = friday ? "table-row" : "none";
    }

    function updateNextPrayer() {
      clearActivePrayerRow();

      const now = getTorontoNow();

      const schedule = isFridayToronto()
        ? [
            { key: "fajr", label: "Fajr", time: state.prayers.fajr },
            { key: "jumah1", label: "Jumah 1", time: state.prayers.jumah1 },
            { key: "jumah2", label: "Jumah 2", time: state.prayers.jumah2 },
            { key: "asr", label: "Asr", time: state.prayers.asr },
            { key: "maghrib", label: "Maghrib", time: state.prayers.maghrib },
            { key: "isha", label: "Isha", time: state.prayers.isha }
          ]
        : [
            { key: "fajr", label: "Fajr", time: state.prayers.fajr },
            { key: "dhuhr", label: "Dhuhr", time: state.prayers.dhuhr },
            { key: "asr", label: "Asr", time: state.prayers.asr },
            { key: "maghrib", label: "Maghrib", time: state.prayers.maghrib },
            { key: "isha", label: "Isha", time: state.prayers.isha }
          ];

      let nextPrayer = null;

      for (const prayer of schedule) {
        const prayerDate = parseTimeToday(prayer.time);

        if (prayerDate && prayerDate > now) {
          nextPrayer = {
            ...prayer,
            date: prayerDate
          };
          break;
        }
      }

      if (!nextPrayer) {
        const tomorrowFajr = parseTimeToday(state.prayers.fajr);

        if (tomorrowFajr) {
          tomorrowFajr.setDate(tomorrowFajr.getDate() + 1);
          nextPrayer = {
            key: "fajr",
            label: "Fajr",
            time: state.prayers.fajr,
            date: tomorrowFajr
          };
        }
      }

      if (!nextPrayer) {
        setText("nextPrayerName", "Unavailable");
        setText("nextPrayerMeta", "--");
        setText("countdown", "--");
        return;
      }

      const diff = nextPrayer.date - now;

      setText("nextPrayerName", nextPrayer.label);
      setText("nextPrayerMeta", formatDisplayTime(nextPrayer.time));
      setText("countdown", formatCountdown(diff));

      const activeRow = document.querySelector(`tr[data-prayer="${nextPrayer.key}"]`);
      if (activeRow) activeRow.classList.add("active");
    }

    async function loadPrayerTimes() {
      try {
        setStatus("Loading prayer times...");

        const response = await fetch(CONFIG.prayerJsonUrl, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();
        console.log("Prayer JSON response:", data);

        state.prayers.fajr = data.fajr || "--:--";
        state.prayers.dhuhr = data.dhuhr || "--:--";
        state.prayers.asr = data.asr || "--:--";
        state.prayers.maghrib = data.maghrib || "--:--";
        state.prayers.isha = data.isha || "--:--";
        state.prayers.jumah1 = data.jumah1 || "--:--";
        state.prayers.jumah2 = data.jumah2 || "--:--";

        renderPrayerTimes();
        toggleFridayRows();
        updateNextPrayer();

        setStatus("Prayer times loaded");
      } catch (err) {
        console.error("Error loading prayerTimes.json:", err);
        setStatus(`Prayer JSON failed: ${err.message}`, true);
      }
    }

    function rotateImages() {
      const imageEl = $("rotatingImage");
      if (!imageEl || images.length === 0) return;

      imageEl.src = images[state.imageIndex];
      state.imageIndex = (state.imageIndex + 1) % images.length;
    }

    toggleFridayRows();
    updateClock();
    setInterval(updateClock, 1000);

    rotateImages();
    if (images.length > 1) {
      setInterval(rotateImages, CONFIG.imageRotateMs);
    }

    setInterval(() => location.reload(), CONFIG.autoReloadMs);

    loadPrayerTimes();
  </script>
</body>
</html>
